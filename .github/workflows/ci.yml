name: validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  full:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - run: npm run validate

  windows-portability:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run check
      - run: node --test tests/host-registry.test.mjs tests/platform-validation.test.mjs
